<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>澜镜 A23 | 历史轨迹</title>
  <style>
    body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #edf4ef; color: #10251d; }
    .shell { max-width: 1080px; margin: 0 auto; padding: 24px; }
    .panel { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 16px 40px rgba(16,37,29,.1); }
    h1,h2 { margin: 0 0 14px; font-family: "Bahnschrift", "Trebuchet MS", sans-serif; }
    p, li { color: #5d7269; line-height: 1.8; }
    .timeline { margin-top: 18px; display: grid; gap: 12px; }
    .item { padding: 14px 16px; border-radius: 18px; background: #f3f7f5; }
    .actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .button { min-height: 46px; padding: 0 18px; border-radius: 999px; display: inline-flex; align-items: center; text-decoration: none; font-weight: 700; }
    .primary { background: #0f8f84; color: white; }
    .secondary { background: #eef3f1; color: #10251d; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <h1>历史轨迹页面</h1>
      <p>本页单独承载时间轴、事件回溯和趋势变化，避免跟地图点位、风险热区混在一页里。</p>
      <div class="timeline">
        <div class="item"><strong>07-16</strong><p>系统开始记录近期蓝藻风险波动。</p></div>
        <div class="item"><strong>07-20</strong><p>热点区风险抬升，进入重点关注阶段。</p></div>
        <div class="item"><strong>07-23</strong><p>西北热点区进入橙色预警窗口。</p></div>
        <div class="item"><strong>07-30</strong><p>用于展示未来趋势回放和情景推演。</p></div>
      </div>
      <div class="actions">
        <a class="button primary" href="./stations.html">返回监测站页</a>
        <a class="button secondary" href="./cockpit.html">返回驾驶舱总览</a>
      </div>
    </div>
  </div>
</body>
</html>
